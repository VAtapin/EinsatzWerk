name: einsatzwerk-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: einsatzwerk
      POSTGRES_USER: einsatzwerk
      POSTGRES_PASSWORD: einsatzwerk_dev
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - einsatzwerk_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U einsatzwerk -d einsatzwerk"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:56389:6379"
    volumes:
      - einsatzwerk_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  einsatzwerk_postgres:
  einsatzwerk_redis:
