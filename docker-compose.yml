name: einsatzwerk

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-einsatzwerk}
      POSTGRES_USER: ${DB_USERNAME:-einsatzwerk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    command: php artisan migrate --force
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: no

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - backend-storage:/var/www/html/storage/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./apps/backend/public:/var/www/html/public:ro
      - ./docker/backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    command: php artisan queue:work --sleep=2 --tries=3 --timeout=120
    volumes:
      - backend-storage:/var/www/html/storage/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    command: php artisan schedule:work
    volumes:
      - backend-storage:/var/www/html/storage/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api/v1}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  backend-storage:
